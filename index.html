<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gramathan SEO Tools</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
        <h1>Gramathan SEO Tools</h1>
        <p class="subtitle">Analyze your Website SEO instantly</p>
    <div class="seo-box">
        <input type="text" id="urlInput" placeholder="Enter your website URL">
        <button onclick="analyzeSEO()">Analyze SEO</button>
        </div>
        <h2 class="Report-title">SEO Analysis Report</h2>
        <div class="results" id="result">
        <div class="card">
            <h2>SEO score</h2>
            <p id="score">--</p>
            <div class="progress-bar">
            <div class="[progress" id="progress"></div>        </div>
        </div>
        </div>
        <div class="card">
            <h2>Meta Title</h2>
            <p id="titleResult">Waiting...</p>
            </div>
        <div class="card">
            <h2>Meta Description</h2>
            <p id="descriptionResult">Waiting..</p>
        </div>
        <div class="card">
            <h2>Mobile Friendly</h2>
            <p id="mobileResult">Waiting...</p>
        </div>
        </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
